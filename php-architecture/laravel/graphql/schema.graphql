type User {
    id: ID!
    name: String!
    email: String!
}

type Query {
    users: [User!]! @all(model: "App\\Models\\User")
    #user(id: ID!): User @find(model: "App\\Models\\User")
    user(id: ID!): User @field(resolver: "App\\GraphQL\\Resolvers\\UserResolver@findUser")
}

type Mutation {
    createUser(name: String!, email: String!, password: String!): User @create(model: "App\\Models\\User")
}
